const puppeteer = require('puppeteer');

(async () => {
  console.log('Launching headless browser...');
  
  // These arguments are CRITICAL for running Puppeteer inside a GitHub Actions environment (Ubuntu runner).
  // Without them, the Chromium process will crash due to permission and memory limitations.
  const browser = await puppeteer.launch({
    headless: true, // Must be true for CI/CD environments
    args: [
      '--no-sandbox',
      '--disable-setuid-sandbox',
      '--disable-dev-shm-usage'
    ]
  });

  try {
    const page = await browser.newPage();
    
    console.log('Navigating to example.com...');
    await page.goto('https://example.com', { waitUntil: 'networkidle2' });
    
    // Do your scraping or automation here
    const title = await page.title();
    console.log(`Success! The page title is: ${title}`);
    
  } catch (error) {
    console.error('An error occurred during the script:', error);
    process.exit(1); // Fail the GitHub Action if there's an error
  } finally {
    await browser.close();
    console.log('Browser closed safely.');
  }
})();
